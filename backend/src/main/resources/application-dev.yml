spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shopease}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

logging:
  level:
    com.shopease: DEBUG
    org.hibernate.SQL: DEBUG

app:
  payment:
    provider: stripe
    # Stripe test keys - must be configured via environment variables
    stripe-secret-key: ${APP_STRIPE_SECRET_KEY:sk_test_default}
    stripe-publishable-key: ${APP_STRIPE_PUBLISHABLE_KEY:pk_test_default}
    stripe-webhook-secret: ${APP_STRIPE_WEBHOOK_SECRET:whsec_test_default}
